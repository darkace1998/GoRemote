name: WebUI CI

on:
  push:
    branches: ['**']
    paths:
      - 'webui/**'
      - '.github/workflows/webui-ci.yml'
  pull_request:
    paths:
      - 'webui/**'
      - '.github/workflows/webui-ci.yml'

permissions:
  contents: read

jobs:
  webui:
    name: WebUI Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webui/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: |
          if node -e "process.exit(require('./package.json').scripts && require('./package.json').scripts.test ? 0 : 1)"; then
            npm test -- --run
          else
            echo "No test script defined; skipping."
          fi

      - name: Build
        run: npm run build
