# Release workflow for goremote desktop binaries.
#
# Stages:
#   1. build: cross-compile the desktop binary for every supported target.
#   2. sign-windows: Authenticode-sign the .exe and produce an MSI via WiX.
#   3. manifest: assemble update.json with per-target SHA-256, sign each
#      target with the Ed25519 release key, upload as a release artifact.
#
# macOS notarization is intentionally absent at this stage - the hooks
# are documented in installers/windows/README.md so they can be wired up
# in a follow-on PR once a Developer ID certificate is available.
#
# Required secrets (see installers/windows/README.md):
#   GOREMOTE_RELEASE_KEY      Ed25519 private key (base64) for update manifest
#   WINDOWS_CERT_PFX_BASE64   Authenticode .pfx (base64)
#   WINDOWS_CERT_PASSWORD     password for the .pfx
#
# Required vars:
#   WINDOWS_UPGRADE_CODE      stable GUID for the MSI Upgrade table
#   UPDATE_BASE_URL           e.g. https://releases.example.com/goremote

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.13.0)'
        required: true
        type: string

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build cmd/desktop
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          VERSION: ${{ inputs.version }}
        run: |
          mkdir -p dist
          ext=""
          if [ "$GOOS" = "windows" ]; then
            ext=".exe"
          fi
          out="dist/goremote-${GOOS}-${GOARCH}${ext}"
          go build -trimpath -ldflags "-s -w -X main.Version=${VERSION}" -o "$out" ./cmd/desktop
          ls -la dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: goremote-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  sign-windows:
    name: Sign Windows + build MSI
    needs: build
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: goremote-windows-${{ matrix.arch }}
          path: dist

      - name: Decode signing certificate
        env:
          PFX_B64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
        shell: pwsh
        run: |
          if (-not $env:PFX_B64) { Write-Host "no signing cert configured, skipping"; exit 0 }
          [System.IO.File]::WriteAllBytes("$env:RUNNER_TEMP\cert.pfx", [Convert]::FromBase64String($env:PFX_B64))

      - name: Authenticode-sign goremote.exe
        if: ${{ secrets.WINDOWS_CERT_PFX_BASE64 != '' }}
        env:
          CERT_PW: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist\goremote-windows-${{ matrix.arch }}.exe | Select-Object -First 1
          & "${env:ProgramFiles(x86)}\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" `
            sign /tr http://timestamp.digicert.com /td sha256 /fd sha256 `
            /f "$env:RUNNER_TEMP\cert.pfx" /p $env:CERT_PW $exe.FullName

      - name: Install WiX
        run: dotnet tool install --global wix

      - name: Build MSI
        env:
          VERSION: ${{ inputs.version }}
          UPGRADE_CODE: ${{ vars.WINDOWS_UPGRADE_CODE }}
        shell: pwsh
        run: |
          if (-not $env:UPGRADE_CODE) { throw "WINDOWS_UPGRADE_CODE variable is not set" }
          $exe = "dist\goremote-windows-${{ matrix.arch }}.exe"
          # WiX wants an RTF; generate a minimal one if the repo doesn't ship one.
          if (-not (Test-Path "installers\windows\license.rtf")) {
            "{\rtf1\ansi goremote - see LICENSE in source repository.}" | Out-File -Encoding ascii installers\windows\license.rtf
          }
          wix build installers\windows\goremote.wxs `
            -d Version=$env:VERSION `
            -d "SourceExe=$exe" `
            -d "LicenseRtf=installers\windows\license.rtf" `
            -d "UpgradeCode=$env:UPGRADE_CODE" `
            -ext WixToolset.UI.wixext `
            -arch ${{ matrix.arch == 'amd64' && 'x64' || 'arm64' }} `
            -o "dist\goremote-${{ matrix.arch }}-$env:VERSION.msi"

      - name: Authenticode-sign MSI
        if: ${{ secrets.WINDOWS_CERT_PFX_BASE64 != '' }}
        env:
          CERT_PW: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        shell: pwsh
        run: |
          $msi = Get-ChildItem "dist\goremote-${{ matrix.arch }}-${{ inputs.version }}.msi" | Select-Object -First 1
          & "${env:ProgramFiles(x86)}\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" `
            sign /tr http://timestamp.digicert.com /td sha256 /fd sha256 `
            /f "$env:RUNNER_TEMP\cert.pfx" /p $env:CERT_PW $msi.FullName

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: goremote-windows-${{ matrix.arch }}-signed
          path: dist/*

  manifest:
    name: Sign update manifest
    needs: [build, sign-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Compute SHA-256 sums and assemble manifest
        env:
          VERSION: ${{ inputs.version }}
          BASE_URL: ${{ vars.UPDATE_BASE_URL }}
        run: |
          set -euo pipefail
          : "${BASE_URL:=https://example.invalid/goremote}"
          targets='[]'
          add() {
            local file="$1" os="$2" arch="$3" url_name="$4"
            [ -f "$file" ] || return 0
            local sum
            sum="$(sha256sum "$file" | cut -d' ' -f1)"
            targets="$(jq --arg os "$os" --arg arch "$arch" --arg url "${BASE_URL}/${VERSION}/${url_name}" --arg sha "$sum" \
              '. += [{os:$os,arch:$arch,url:$url,sha256:$sha}]' <<<"$targets")"
          }
          add dist/goremote-linux-amd64/goremote-linux-amd64               linux   amd64 goremote-linux-amd64
          add dist/goremote-linux-arm64/goremote-linux-arm64               linux   arm64 goremote-linux-arm64
          add dist/goremote-darwin-amd64/goremote-darwin-amd64             darwin  amd64 goremote-darwin-amd64
          add dist/goremote-darwin-arm64/goremote-darwin-arm64             darwin  arm64 goremote-darwin-arm64
          add dist/goremote-windows-amd64-signed/goremote-windows-amd64.exe windows amd64 goremote-windows-amd64.exe
          add dist/goremote-windows-arm64-signed/goremote-windows-arm64.exe windows arm64 goremote-windows-arm64.exe
          jq --arg v "$VERSION" --argjson t "$targets" \
            '{version:$v, notes:"", targets:$t}' \
            <<<'{}' > update.json
          cat update.json

      - name: Sign manifest
        if: ${{ secrets.GOREMOTE_RELEASE_KEY != '' }}
        env:
          GOREMOTE_RELEASE_KEY: ${{ secrets.GOREMOTE_RELEASE_KEY }}
        run: |
          go run ./cmd/sign-manifest -in update.json -out update.json
          echo '--- signed manifest ---'
          cat update.json

      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: update-manifest
          path: update.json
          if-no-files-found: error
