# Release workflow for goremote desktop binaries.
#
# Pipeline:
#   1. build:        natively compile cmd/desktop on each target OS (CGO is
#                    required by Fyne, so cross-compiling from one host is
#                    not viable without per-target C toolchains).
#   2. sign-windows: Authenticode-sign the .exe and produce an MSI via WiX.
#   3. manifest:     assemble update.json with per-target SHA-256, sign with
#                    the Ed25519 release key, upload as a release artifact.
#
# Only amd64 targets are produced today. linux-arm64 and windows-arm64
# require additional cross-toolchain wiring and will be added once the
# release surface stabilises.
#
# macOS notarization is intentionally absent at this stage — the hooks
# are documented in installers/windows/README.md so they can be wired
# up in a follow-on PR once a Developer ID certificate is available.
#
# Required secrets (see installers/windows/README.md):
#   GOREMOTE_RELEASE_KEY      Ed25519 private key (base64) for update manifest
#   WINDOWS_CERT_PFX_BASE64   Authenticode .pfx (base64)
#   WINDOWS_CERT_PASSWORD     password for the .pfx
#
# Required vars:
#   WINDOWS_UPGRADE_CODE      stable GUID for the MSI Upgrade table
#   UPDATE_BASE_URL           e.g. https://releases.example.com/goremote

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.9.0 or v0.9.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  GO_VERSION: '1.26.2'

jobs:
  prepare:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.resolve.outputs.app_version }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - name: Resolve app version and tag
        id: resolve
        env:
          INPUT_VERSION: ${{ inputs.version }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          raw="$INPUT_VERSION"
          if [ -z "$raw" ]; then
            if [ "$EVENT_NAME" = "release" ]; then
              raw="$RELEASE_TAG"
            else
              raw="$REF_NAME"
            fi
          fi
          if [ -z "$raw" ]; then
            echo "unable to determine release version" >&2
            exit 1
          fi
          app_version="${raw#v}"
          release_tag="$raw"
          case "$release_tag" in
            v*) ;;
            *) release_tag="v$release_tag" ;;
          esac
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

  build-linux:
    name: Build linux/amd64
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install Fyne build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc pkg-config \
            libgl1-mesa-dev xorg-dev \
            libxxf86vm-dev libxkbcommon-dev

      - name: Build cmd/desktop
        env:
          CGO_ENABLED: '1'
          VERSION: ${{ needs.prepare.outputs.app_version }}
        run: |
          mkdir -p dist
          go build -trimpath \
            -ldflags "-s -w -X main.Version=${VERSION}" \
            -o dist/goremote-linux-amd64 ./cmd/desktop

      - uses: actions/upload-artifact@v4
        with:
          name: goremote-linux-amd64
          path: dist/goremote-linux-amd64
          if-no-files-found: error

  build-darwin:
    name: Build darwin/${{ matrix.goarch }}
    needs: prepare
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build cmd/desktop
        env:
          CGO_ENABLED: '1'
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.prepare.outputs.app_version }}
        run: |
          mkdir -p dist
          go build -trimpath \
            -ldflags "-s -w -X main.Version=${VERSION}" \
            -o dist/goremote-darwin-${GOARCH} ./cmd/desktop

      - uses: actions/upload-artifact@v4
        with:
          name: goremote-darwin-${{ matrix.goarch }}
          path: dist/goremote-darwin-${{ matrix.goarch }}
          if-no-files-found: error

  build-windows:
    name: Build windows/amd64
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build cmd/desktop
        shell: pwsh
        env:
          CGO_ENABLED: '1'
          VERSION: ${{ needs.prepare.outputs.app_version }}
        run: |
          mkdir dist | Out-Null
          go build -trimpath `
            -ldflags "-s -w -H windowsgui -X main.Version=$env:VERSION" `
            -o dist\goremote-windows-amd64.exe .\cmd\desktop

      - uses: actions/upload-artifact@v4
        with:
          name: goremote-windows-amd64
          path: dist/goremote-windows-amd64.exe
          if-no-files-found: error

  sign-windows:
    name: Sign Windows + build MSI
    needs: [prepare, build-windows]
    runs-on: windows-latest
    # Surface signing-related secrets as env vars so step-level `if:`
    # guards can reference them — `secrets.*` is not available at that
    # scope. Empty string when the secret isn't configured.
    env:
      PFX_B64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
      CERT_PW: ${{ secrets.WINDOWS_CERT_PASSWORD }}
      UPGRADE_CODE: ${{ vars.WINDOWS_UPGRADE_CODE }}
    steps:
      - uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: goremote-windows-amd64
          path: dist

      - name: Decode signing certificate
        if: ${{ env.PFX_B64 != '' }}
        shell: pwsh
        run: |
          [System.IO.File]::WriteAllBytes("$env:RUNNER_TEMP\cert.pfx", [Convert]::FromBase64String($env:PFX_B64))

      - name: Authenticode-sign goremote.exe
        if: ${{ env.PFX_B64 != '' }}
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist\goremote-windows-amd64.exe | Select-Object -First 1
          $signtool = (Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
                       Sort-Object FullName -Descending | Select-Object -First 1).FullName
          & $signtool sign /tr http://timestamp.digicert.com /td sha256 /fd sha256 `
            /f "$env:RUNNER_TEMP\cert.pfx" /p $env:CERT_PW $exe.FullName

      - name: Report MSI packaging disabled
        if: ${{ env.UPGRADE_CODE == '' }}
        shell: pwsh
        run: |
          Write-Warning "WINDOWS_UPGRADE_CODE is not set; skipping MSI packaging and publishing the signed EXE only."

      - name: Install WiX
        if: ${{ env.UPGRADE_CODE != '' }}
        run: dotnet tool install --global wix

      - name: Build MSI
        if: ${{ env.UPGRADE_CODE != '' }}
        env:
          VERSION: ${{ needs.prepare.outputs.app_version }}
        shell: pwsh
        run: |
          $exe = "dist\goremote-windows-amd64.exe"
          if (-not (Test-Path "installers\windows\license.rtf")) {
            "{\rtf1\ansi goremote - see LICENSE in source repository.}" | Out-File -Encoding ascii installers\windows\license.rtf
          }
          wix build installers\windows\goremote.wxs `
            -d Version=$env:VERSION `
            -d "SourceExe=$exe" `
            -d "LicenseRtf=installers\windows\license.rtf" `
            -d "UpgradeCode=$env:UPGRADE_CODE" `
            -ext WixToolset.UI.wixext `
            -arch x64 `
            -o "dist\goremote-amd64-$env:VERSION.msi"

      - name: Authenticode-sign MSI
        if: ${{ env.PFX_B64 != '' && env.UPGRADE_CODE != '' }}
        shell: pwsh
        run: |
          $msi = Get-ChildItem "dist\goremote-amd64-${{ needs.prepare.outputs.app_version }}.msi" | Select-Object -First 1
          $signtool = (Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
                       Sort-Object FullName -Descending | Select-Object -First 1).FullName
          & $signtool sign /tr http://timestamp.digicert.com /td sha256 /fd sha256 `
            /f "$env:RUNNER_TEMP\cert.pfx" /p $env:CERT_PW $msi.FullName

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: goremote-windows-amd64-signed
          path: dist/*

  manifest:
    name: Sign update manifest
    needs: [prepare, build-linux, build-darwin, build-windows, sign-windows]
    runs-on: ubuntu-latest
    env:
      RELEASE_KEY: ${{ secrets.GOREMOTE_RELEASE_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Compute SHA-256 sums and assemble manifest
        env:
          VERSION: ${{ needs.prepare.outputs.app_version }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          BASE_URL: ${{ vars.UPDATE_BASE_URL }}
        run: |
          set -euo pipefail
          if [ -n "${BASE_URL}" ]; then
            asset_base_url="${BASE_URL}/${VERSION}"
          else
            asset_base_url="https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}"
          fi
          targets='[]'
          add() {
            local file="$1" os="$2" arch="$3" url_name="$4"
            [ -f "$file" ] || { echo "skip: $file (not present)"; return 0; }
            local sum
            sum="$(sha256sum "$file" | cut -d' ' -f1)"
            targets="$(jq --arg os "$os" --arg arch "$arch" --arg url "${asset_base_url}/${url_name}" --arg sha "$sum" \
              '. += [{os:$os,arch:$arch,url:$url,sha256:$sha}]' <<<"$targets")"
          }
          add dist/goremote-linux-amd64/goremote-linux-amd64                 linux   amd64 goremote-${RELEASE_TAG}-linux-amd64
          add dist/goremote-darwin-amd64/goremote-darwin-amd64               darwin  amd64 goremote-${RELEASE_TAG}-darwin-amd64
          add dist/goremote-darwin-arm64/goremote-darwin-arm64               darwin  arm64 goremote-${RELEASE_TAG}-darwin-arm64
          add dist/goremote-windows-amd64-signed/goremote-windows-amd64.exe  windows amd64 goremote-${RELEASE_TAG}-windows-amd64.exe
          jq --arg v "$VERSION" --argjson t "$targets" \
            '{version:$v, notes:"", targets:$t}' \
            <<<'{}' > update.json
          cat update.json

      - name: Sign manifest
        if: ${{ env.RELEASE_KEY != '' }}
        env:
          GOREMOTE_RELEASE_KEY: ${{ secrets.GOREMOTE_RELEASE_KEY }}
        run: |
          go run ./cmd/sign-manifest -in update.json -out update.json
          echo '--- signed manifest ---'
          cat update.json

      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: update-manifest
          path: update.json
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release assets
    needs: [prepare, manifest]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare release assets
        env:
          APP_VERSION: ${{ needs.prepare.outputs.app_version }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp dist/goremote-linux-amd64/goremote-linux-amd64 "release-assets/goremote-${RELEASE_TAG}-linux-amd64"
          cp dist/goremote-darwin-amd64/goremote-darwin-amd64 "release-assets/goremote-${RELEASE_TAG}-darwin-amd64"
          cp dist/goremote-darwin-arm64/goremote-darwin-arm64 "release-assets/goremote-${RELEASE_TAG}-darwin-arm64"
          cp dist/goremote-windows-amd64-signed/goremote-windows-amd64.exe "release-assets/goremote-${RELEASE_TAG}-windows-amd64.exe"
          if [ -f "dist/goremote-windows-amd64-signed/goremote-amd64-${APP_VERSION}.msi" ]; then
            cp dist/goremote-windows-amd64-signed/goremote-amd64-${APP_VERSION}.msi "release-assets/goremote-${RELEASE_TAG}-windows-amd64.msi"
          fi
          cp dist/update-manifest/update.json "release-assets/update-${RELEASE_TAG}.json"
          ls -l release-assets

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          APP_VERSION: ${{ needs.prepare.outputs.app_version }}
        run: |
          set -euo pipefail
          if ! gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --repo "$GH_REPO" \
              --title "$RELEASE_TAG" \
              --notes "Release $RELEASE_TAG" \
              --target "${GITHUB_SHA}"
          fi
          gh release upload "$RELEASE_TAG" release-assets/* --repo "$GH_REPO" --clobber
