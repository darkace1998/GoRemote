version: "2"

run:
  tests: true

linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - errcheck
    - errorlint
    - govet
    - ineffassign
    - misspell
    - nilerr
    - staticcheck
    - unconvert
    - unused
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (*os/exec.Cmd).Wait
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - os.Remove
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1003
        - -ST1020
        - -ST1021
        - -ST1022
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - bodyclose
      - path: (.*_grpc\.pb\.go|.*\.pb\.go)
        linters:
          - all
      # mosh/rdp/powershell deliberately swallow ctx-cancel errors when
      # the user closes the session — those are not real failures.
      - path: plugins/protocol-(mosh|rdp|powershell)/.*\.go
        linters:
          - nilerr
    paths:
      - .*_grpc\.pb\.go$
      - .*\.pb\.go$
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - .*_grpc\.pb\.go$
      - .*\.pb\.go$
